name: Build Reth Docker images

on:
  push:
    tags:
      - "v*"
    branches:
      - "main"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - chain: reth
            binary_name: reth-firehose-tracer
            platform: linux/amd64
            platform_suffix: amd64
            runner: ubuntu-24.04
          - chain: reth
            binary_name: reth-firehose-tracer
            platform: linux/arm64
            platform_suffix: arm64
            runner: ubuntu-24.04-arm
          - chain: op-reth
            binary_name: op-reth-firehose-tracer
            platform: linux/amd64
            platform_suffix: amd64
            runner: ubuntu-24.04
          - chain: op-reth
            binary_name: op-reth-firehose-tracer
            platform: linux/arm64
            platform_suffix: arm64
            runner: ubuntu-24.04-arm
          - chain: base-reth
            binary_name: base-reth-firehose-tracer
            platform: linux/amd64
            platform_suffix: amd64
            runner: ubuntu-24.04
          - chain: base-reth
            binary_name: base-reth-firehose-tracer
            platform: linux/arm64
            platform_suffix: arm64
            runner: ubuntu-24.04-arm

    runs-on: ["${{ matrix.runner }}"]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: extract-version
        run: |
          version="edge"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version=${GITHUB_REF#refs/tags/}
          fi

          echo "VERSION=${version}" >> "$GITHUB_OUTPUT"

      - name: Generate docker tags/labels from github build context
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.chain }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=,suffix=-${{ steps.extract-version.outputs.VERSION }}-${{ matrix.platform_suffix }}
            type=edge,branch=main,priority=1
          flavor: |
            latest=${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref, 'beta') && !contains(github.ref, 'rc') }}

      - name: Build and push Docker image (${{ matrix.chain }} ${{ matrix.platform }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.reth
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          build-args: |
            CHAIN_BINARY_NAME=${{ matrix.binary_name }}

      - name: Get Job ID from GH API
        id: get_job_id
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          jobs=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}/jobs")
          job_id=$(echo "$jobs" | jq -r '.jobs[] | select(.runner_name=="${{ runner.name }}") | .id')
          echo "job_id=$job_id" >> $GITHUB_OUTPUT

      - name: Notify build failure on Slack
        if: ${{ failure() && secrets.SLACK_WEBHOOK != '' }}
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        uses: Ilshidur/action-slack@2.1.0
        with:
          args: |
            :x: *${{ github.repository }}* Failed building `${{ matrix.chain }}` image (${{ matrix.platform_suffix }}) from ${{ github.ref_type }} _${{ github.ref_name }}_ (${{ github.actor }}, <https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}/job/${{ steps.get_job_id.outputs.job_id }}|See Actions Logs>) :broken_heart:

  push:
    needs: [build]
    strategy:
      matrix:
        include:
          - chain: reth
          - chain: op-reth
          - chain: base-reth

    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write

    steps:
      - name: Docker login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate docker tags/labels from github build context
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.chain }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=
            type=edge,branch=main,priority=1
          flavor: |
            latest=${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref, 'beta') && !contains(github.ref, 'rc') }}
          sep-tags: ","

      - name: Extract version
        id: extract-version
        run: |
          version="edge"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version=${GITHUB_REF#refs/tags/}
          fi

          echo "VERSION=${version}" >> "$GITHUB_OUTPUT"

      - name: Extract image
        id: image
        run: |
          echo "ID=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.chain }}:${GITHUB_SHA::7}-${{ steps.extract-version.outputs.VERSION }}" >> "$GITHUB_OUTPUT"

      - name: Create and push manifest images
        uses: Noelware/docker-manifest-action@0.4.3
        with:
          inputs: "${{ steps.meta.outputs.tags }}"
          images: "${{ steps.image.outputs.ID }}-amd64, ${{ steps.image.outputs.ID }}-arm64"
          push: true

      - name: Get Job ID from GH API
        id: get_job_id
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          jobs=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}/jobs")
          job_id=$(echo "$jobs" | jq -r '.jobs[] | select(.runner_name=="${{ runner.name }}") | .id')
          echo "job_id=$job_id" >> $GITHUB_OUTPUT

      - name: Notify manifest push failure on Slack
        if: ${{ failure() && secrets.SLACK_WEBHOOK != '' }}
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        uses: Ilshidur/action-slack@2.1.0
        with:
          args: |
            :x: *${{ github.repository }}* Failed pushing `${{ matrix.chain }}` docker manifest from ${{ github.ref_type }} _${{ github.ref_name }}_ (${{ github.actor }}, <https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}/job/${{ steps.get_job_id.outputs.job_id }}|See Actions Logs>) :broken_heart:

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [push]
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      - name: Set Env
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Extract Changelog
        id: changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            curl -L https://github.com/streamingfast/sfreleaser/releases/download/v0.12.1/sfreleaser_linux_x86_64.tar.gz | tar -xz
            chmod +x sfreleaser

            ./sfreleaser changelog extract-section \
              github://token:${{ github.token }}@${{ github.repository }}/$GITHUB_SHA/CHANGELOG.md \
              --github-output="changelog:$GITHUB_OUTPUT" || echo "changelog=Release ${{ env.RELEASE_VERSION }}" >> $GITHUB_OUTPUT
          else
            echo "changelog=Release ${{ env.RELEASE_VERSION }}" >> $GITHUB_OUTPUT
          fi

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
