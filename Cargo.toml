[workspace]
members = ["pb", "firehose", "firehose-test", "monad", "monad-plugin"]
resolver = "2"

[workspace.package]
version = "4.0.3"
edition = "2021"

[workspace.dependencies]
# Internal workspace crates
pb = { version = "4.0.3", path = "pb" }
firehose = { version = "4.0.3", path = "firehose" }

# Alloy dependencies (compatible with rustc 1.89)
alloy-primitives = "=1.5.2"
alloy-consensus = "=1.5.2"
alloy-genesis = "=1.5.2"
alloy-rlp = "=0.3.13"
alloy-eips = "=1.5.2"

# Other dependencies
base64 = "0.22"
clap = { version = "4", features = ["derive", "env"] }
eyre = "0.6"
futures-util = "0.3"
hex = "0.4"
prost = "0.14"
prost-types = "0.14"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
tokio-stream = "0.1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
chrono = { version = "0.4", features = ["serde"] }
color-eyre = "0.6"

# Monad-specific dependencies
monad-exec-events = { git = "https://github.com/streamingfast/monad-bft", branch = "feature/add-sys-calls-fh" }
monad-event-ring = { git = "https://github.com/streamingfast/monad-bft", branch = "feature/add-sys-calls-fh" }
