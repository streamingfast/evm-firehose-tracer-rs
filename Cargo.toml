[workspace]
members = ["firehose", "firehose-test", "monad", "monad-plugin", "pb", "reth"]
resolver = "2"

[workspace.package]
edition = "2021"

[workspace.dependencies]
# Internal workspace crates
pb = { version = "2.0.0", path = "pb" }
firehose = { version = "5.0.0-rc.0", path = "firehose" }

# Alloy dependencies
alloy-consensus = "1.5"
alloy-eips = "1.5"
alloy-genesis = "1.5"
alloy-primitives = "1.5"
alloy-rlp = "0.3"

# Other dependencies
base64 = "0.22"
clap = { version = "4", features = ["derive", "env"] }
eyre = "0.6"
futures-util = "0.3"
hex = "0.4"
num_enum = "0.7"
prost = "0.14"
prost-types = "0.14"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
tokio-stream = "0.1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
chrono = { version = "0.4", features = ["serde"] }
color-eyre = "0.6"

# Monad-specific dependencies
monad-exec-events = { git = "https://github.com/streamingfast/monad-bft", branch = "feature/add-sys-calls-fh" }
monad-event-ring = { git = "https://github.com/streamingfast/monad-bft", branch = "feature/add-sys-calls-fh" }

# This is needed otherwise we get flooding of debug logs around a problem that seems to happen in Reth directly.
# This is about wrong execution pool and cool be related to ExEx in general (not just our version). We will
# need to investigate to ensure we are not doing wrong thing that could hinder threading in production.
[profile.dev.package.reth-chain-state]
debug-assertions = false
